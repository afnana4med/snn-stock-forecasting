algorithm: eprop
data:
  encoding: temporal
  features:
  - Open
  - High
  - Low
  - Close
  - Volume
  files:
  - data/raw/sp500_etf_daily.csv
  normalize: window
  prediction_horizon: 1
  sequence_length: 20
  target_column: Close
  target_mode: delta
device: cuda
dt: 1.0
experiment_name: snn_delta_temporal_spy
logging:
  log_interval: 1
  save_dir: experiments/best
max_samples: null
model:
  hidden_layers:
  - units: 32
  neuron_model: LIF
  neuron_params:
    refractory_period: 1.0
    tau_mem: 20.0
    tau_syn: 5.0
    threshold: 0.4
  output_neurons: 1
  output_readout: var
n_steps: 50
task: regression
training:
  batch_size: 8
  epochs: 40
  learning_rate: 0.005
  lr_decay: 0.7
  lr_decay_every: 10
  optimiser: adam
  random_seed: 42
  validation_split: 0.2

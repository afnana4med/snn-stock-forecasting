experiment_name: "snn_temporal_eprop_aapl"
task: "regression"
algorithm: "eprop"
n_steps: 50           # spike-train length; also the latency-code resolution
dt: 1.0
max_samples: 1500
device: "cuda"        # falls back to CPU automatically if CUDA is missing

data:
  files: ["data/processed/daily_AAPL.csv"]
  features: ["Open", "High", "Low", "Close", "Volume"]
  target_column: "Close"
  sequence_length: 20
  prediction_horizon: 1
  normalize: "window"
  encoding: "temporal"

model:
  neuron_model: "LIF"
  neuron_params:
    threshold: 0.4
    tau_mem: 20.0
    tau_syn: 5.0
    refractory_period: 1.0
  hidden_layers: [{"units": 32}]
  output_neurons: 1
  output_readout: "var"

training:
  epochs: 15
  batch_size: 8          # forced to 1 on the CPU backend
  learning_rate: 0.005
  optimiser: "adam"
  random_seed: 42
  validation_split: 0.2

logging:
  save_dir: "experiments/temporal_eprop"
  log_interval: 1
